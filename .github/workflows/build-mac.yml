name: Build macOS DMG

# Triggers: manual-only via workflow_dispatch. Tag-push trigger is disabled
# until the Mac build has been validated on a real Mac (waiting on crazzmc's
# test feedback). When ready, re-enable the push.tags trigger so `npm run
# release` v* tags automatically produce a Mac DMG attached to the release.
on:
  workflow_dispatch:
    inputs:
      attach_to_latest_release:
        description: 'Attach built DMG to the latest release tag?'
        required: false
        default: 'true'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout sibling Java repo (needed by prebuild-jar.js)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsps-hub-launcher
          # PAT with read access to the private Java source repo.
          # Stored as JAVA_REPO_TOKEN in this repo's Actions secrets.
          token: ${{ secrets.JAVA_REPO_TOKEN }}
          path: java-source
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Make scripts executable
        # tar preserves +x but git checkout sometimes doesn't, so be explicit
        run: |
          chmod +x java-backend/bin/RSPSHub || true
          chmod +x java-source/gradlew || true

      - name: Build Java jar (prebuild hook)
        # Arch-independent: Java bytecode is identical for x64 and arm64, so we
        # build the jar once and reuse it for both DMG builds below. Each build
        # then bundles its OWN arch-matching JRE so the app runs native, not
        # under Rosetta.
        env:
          RSPS_HUB_JAVA_SRC: ${{ github.workspace }}/java-source
        run: node scripts/prebuild-jar.js

      - name: Build x64 DMG (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          echo "Staging x64 JRE..."
          rm -rf java-backend-mac/jre && mkdir -p java-backend-mac
          curl -L 'https://api.adoptium.net/v3/binary/latest/17/ga/mac/x64/jre/hotspot/normal/eclipse' -o /tmp/jre-x64.tar.gz
          tar -xzf /tmp/jre-x64.tar.gz -C java-backend-mac
          mv java-backend-mac/jdk-17*-jre/Contents/Home java-backend-mac/jre
          rm -rf java-backend-mac/jdk-17*-jre /tmp/jre-x64.tar.gz
          chmod +x java-backend-mac/jre/bin/* || true
          chmod +x java-backend-mac/jre/lib/jspawnhelper || true
          npx electron-builder --mac dmg --x64 --publish=never

      - name: Build arm64 DMG (unsigned, Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          echo "Staging arm64 (Apple Silicon) JRE..."
          rm -rf java-backend-mac/jre && mkdir -p java-backend-mac
          curl -L 'https://api.adoptium.net/v3/binary/latest/17/ga/mac/aarch64/jre/hotspot/normal/eclipse' -o /tmp/jre-arm64.tar.gz
          tar -xzf /tmp/jre-arm64.tar.gz -C java-backend-mac
          mv java-backend-mac/jdk-17*-jre/Contents/Home java-backend-mac/jre
          rm -rf java-backend-mac/jdk-17*-jre /tmp/jre-arm64.tar.gz
          chmod +x java-backend-mac/jre/bin/* || true
          chmod +x java-backend-mac/jre/lib/jspawnhelper || true
          npx electron-builder --mac dmg --arm64 --publish=never

      - name: List build output
        run: ls -la dist/ | head -20

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RSPSHub-Setup-v*-mac-*.dmg
            dist/RSPSHub-Setup-v*-mac-*.dmg.blockmap
            dist/latest-mac.yml

      - name: Upload as workflow artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rspshub-mac-dmg
          path: |
            dist/RSPSHub-Setup-v*-mac-*.dmg
            dist/latest-mac.yml
