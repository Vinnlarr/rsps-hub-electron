name: Build macOS DMG

# Triggers: every tag push (which is what `npm run release` does), and
# manual via workflow_dispatch so you can build off main without tagging.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      attach_to_latest_release:
        description: 'Attach built DMG to the latest release tag?'
        required: false
        default: 'true'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout sibling Java repo (needed by prebuild-jar.js)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsps-hub-launcher
          # PAT with read access to the private Java source repo.
          # Stored as JAVA_REPO_TOKEN in this repo's Actions secrets.
          token: ${{ secrets.JAVA_REPO_TOKEN }}
          path: java-source
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci || npm install

      - name: Ensure macOS JRE is present
        # The bundled mac JRE lives at java-backend-mac/jre. We expect it to
        # already be committed. If it's not, download it from Adoptium.
        run: |
          if [ ! -x "java-backend-mac/jre/bin/java" ]; then
            echo "Mac JRE missing, downloading Temurin 17..."
            mkdir -p java-backend-mac
            curl -L 'https://api.adoptium.net/v3/binary/latest/17/ga/mac/x64/jre/hotspot/normal/eclipse' -o /tmp/jre.tar.gz
            tar -xzf /tmp/jre.tar.gz -C java-backend-mac
            mv java-backend-mac/jdk-17*-jre/Contents/Home java-backend-mac/jre
            rm -rf java-backend-mac/jdk-17*-jre /tmp/jre.tar.gz
          fi
          ls -la java-backend-mac/jre/bin/java

      - name: Make scripts executable
        # tar preserves +x but git checkout sometimes doesn't, so be explicit
        run: |
          chmod +x java-backend/bin/RSPSHub || true
          chmod +x java-backend-mac/jre/bin/* || true
          chmod +x java-backend-mac/jre/lib/jspawnhelper || true
          chmod +x java-source/gradlew || true

      - name: Build Java jar (prebuild hook)
        # prebuild-jar.js runs gradle in the sibling repo. Running it as a
        # separate step makes failures easier to read in the Actions log.
        env:
          RSPS_HUB_JAVA_SRC: ${{ github.workspace }}/java-source
        run: node scripts/prebuild-jar.js

      - name: Build macOS DMG (unsigned, x64)
        env:
          # electron-builder needs these set even when not signing
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --x64 --publish=never

      - name: List build output
        run: ls -la dist/ | head -20

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RSPSHub-Setup-v*-mac-*.dmg
            dist/RSPSHub-Setup-v*-mac-*.dmg.blockmap
            dist/latest-mac.yml

      - name: Upload as workflow artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rspshub-mac-dmg
          path: |
            dist/RSPSHub-Setup-v*-mac-*.dmg
            dist/latest-mac.yml
